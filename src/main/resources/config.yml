# SchoolItem Plugin Configuration

abilities:
  pve:
    enabled: true
    min-value: 0.0
    max-value: 100.0
    display-name: "Giảm Sát Thương PVE"
    color: "&#FF6B6B"
    emoji: "⚔️"
    unit: "%"
    description: "Giảm {value}% sát thương từ quái vật"
    
  pvp:
    enabled: true
    min-value: 0.0
    max-value: 100.0
    display-name: "Giảm Sát Thương PVP"
    color: "&#FFA94D"
    emoji: "🛡️"
    unit: "%"
    description: "Giảm {value}% sát thương từ người chơi"
    
  multiplierblock:
    enabled: true
    min-value: 1.0
    max-value: 100.0
    display-name: "Nhân Block"
    color: "&#69DB7C"
    emoji: "⛏️"
    unit: "x"
    description: "Nhân {value}x số lượng block khi đào"

settings:
  enable-message: true
  message-prefix: "&8[&6SchoolItem&8] &r"
  enable-particle-effect: false
  enable-sound-effect: false
  disabled-worlds: []
  lore-separator: "&7&m--------------------------------"
  lore-format: "&{color}{emoji} {display-name} &fGiá trị: &e{value}{unit}"
  lore-description: "&7✦ &f{description}"

item-filter:
  whitelist-mode: true
  allowed-items:
    - "DIAMOND_SWORD"
    - "NETHERITE_SWORD"
    - "DIAMOND_PICKAXE"
    - "NETHERITE_PICKAXE"
    - "DIAMOND_AXE"
    - "NETHERITE_AXE"
    - "BOW"
    - "CROSSBOW"
    - "SHIELD"
  blocked-items:
    - "AIR"
    - "BEDROCK"
    - "COMMAND_BLOCK"