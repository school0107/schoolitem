name: SchoolItem
version: ${project.version}
main: com.schoolitem.SchoolItem
api-version: 1.21
authors: [SchoolDev]
description: Plugin quản lý abilities cho item
commands:
  si:
    description: Lệnh chính của SchoolItem
    usage: /<command> <add|remove> [ability] [value]
    permission: schoolitem.admin
permissions:
  schoolitem.admin:
    description: Cho phép sử dụng tất cả lệnh
    default: op
  schoolitem.use:
    description: Cho phép sử dụng item có ability
    default: true